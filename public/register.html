<!DOCTYPE html>
<html>

<head>

    <title>buyForever Register</title>
     <link rel="shortcut icon" href="images.png" type="image/x-icon">


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }


        body {

            min-height: 100vh;

            background: hsla(280, 95%, 57%, 1);

            background: linear-gradient(90deg,
                    hsla(280, 95%, 57%, 1) 0%,
                    hsla(193, 90%, 55%, 1) 100%);

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

        }



        /* Floating Fashion Icons */

        .background-icons span {

            position: absolute;

            font-size: 65px;

            opacity: 0.18;

            animation: float 8s infinite;

        }



        .background-icons span:nth-child(1) {
            top: 10%;
            left: 12%;
        }


        .background-icons span:nth-child(2) {
            top: 20%;
            right: 15%;
        }


        .background-icons span:nth-child(3) {
            bottom: 15%;
            left: 10%;
        }


        .background-icons span:nth-child(4) {
            bottom: 20%;
            right: 12%;
        }


        .background-icons span:nth-child(5) {
            top: 45%;
            left: 45%;
        }


        .background-icons span:nth-child(6) {
            top: 15%;
            right: 45%;
        }



        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }

        }






        .register-container {

            width: 100%;

            display: flex;

            justify-content: center;

            align-items: center;

        }





        .register-box {


            width: 450px;


            padding: 45px;


            background: rgba(255, 255, 255, 0.18);


            backdrop-filter: blur(15px);


            border-radius: 25px;


            border: 1px solid rgba(255, 255, 255, 0.3);


            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);


            color: white;


            text-align: center;


        }





        .register-box h1 {

            text-decoration: none;

            font-family: "Pacifico", cursive;

            font-size: 53px;

            color: white;

            letter-spacing: 3px;


        }



        .subtitle {

            font-size: 17px;

            margin-bottom: 35px;

            opacity: 0.9;

        }






        .input-box {

            margin-bottom: 18px;

        }



        .input-box input {


            width: 100%;


            padding: 15px 20px;


            border-radius: 30px;


            border: none;


            outline: none;


            font-size: 16px;


        }







        .terms {


            display: flex;

            align-items: center;

            gap: 8px;

            font-size: 14px;

            margin: 15px 0 25px;


        }





        button {


            width: 100%;


            padding: 15px;


            border: none;


            border-radius: 30px;


            font-size: 18px;


            cursor: pointer;


            background: white;


            color: #a12af7;


            font-weight: bold;


            transition: .3s;


        }





        button:hover {

            transform: scale(1.05);

        }






        .login-link {


            margin-top: 25px;

            font-size: 15px;

        }



        .login-link a {

            color: white;

            font-weight: bold;

            text-decoration: none;

        }

        .terms {

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 8px;

            margin: 15px 0 25px;

            font-size: 14px;

            color: white;

        }



        .terms input {

            width: 16px;

            height: 16px;

            cursor: pointer;

        }



        .terms span {

            display: flex;

            align-items: center;

            gap: 5px;

        }



        .terms a {

            color: white;

            font-weight: bold;

            text-decoration: underline;

            transition: 0.3s;

        }



        .terms a:hover {

            color: #f0f0f0;

        }
    </style>


</head>



<body>




    <div class="background-icons">
        <span>👕</span>
        <span>👖</span>
        <span>👟</span>
        <span>🧥</span>
        <span>👜</span>
        <span>👗</span>
        <span>👘</span>
        <span>🥼</span>

    </div>






    <div class="register-container">


        <div class="register-box">



            <h1>
                buyForever
            </h1>


            <p class="subtitle">
                Create your account and start shopping
            </p>





            <form method="post" action="/register">



                <div class="input-box">

                    <input type="text" name="username" placeholder="Full Name" required>

                </div>





                <div class="input-box">

                    <input type="email" name="email" placeholder="Email Address" required>

                </div>





                <div class="input-box">

                    <input type="password" name="password" placeholder="Password" required>

                </div>





                <div class="input-box">

                    <input type="password" name="confirm_password" placeholder="Confirm Password" required>

                </div>

                <div class="terms">

                    <input type="checkbox" name="terms" required>

                    <span>
                        I agree to
                        <a href="/tnc">
                            Terms & Conditions & Privacy Policy
                        </a>
                    </span>

                </div>


                <button type="submit">
                    Create Account
                </button>


                <p class="login-link">
                    Already a customer?
                    <a href="/login">
                        Login
                    </a>

                </p>




            </form>



        </div>


    </div>



</body>


</html>
