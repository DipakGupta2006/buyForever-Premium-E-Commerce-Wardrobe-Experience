<!DOCTYPE html>
<html>

<head>
    <title>buyForever Login</title>
    <link rel="stylesheet" href="login.css">
 <link rel="shortcut icon" href="images.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600&display=swap');

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;

        }



        body {


            min-height: 100vh;


            background: hsla(280, 95%, 57%, 1);

            background: linear-gradient(90deg,
                    hsla(280, 95%, 57%, 1) 0%,
                    hsla(193, 90%, 55%, 1) 100%);


            display: flex;
            justify-content: center;
            align-items: center;


            overflow: hidden;


        }





        /* Floating Fashion Icons */


        .background-icons span {


            position: absolute;

            font-size: 65px;

            opacity: 0.18;

            animation: move 7s infinite;


        }



        .background-icons span:nth-child(1) {

            top: 10%;
            left: 15%;

        }


        .background-icons span:nth-child(2) {

            top: 25%;
            right: 10%;

        }


        .background-icons span:nth-child(3) {

            bottom: 15%;
            left: 10%;

        }


        .background-icons span:nth-child(4) {

            bottom: 20%;
            right: 15%;

        }


        .background-icons span:nth-child(5) {

            top: 50%;
            left: 45%;

        }


        .background-icons span:nth-child(6) {

            top: 15%;
            right: 45%;

        }





        @keyframes move {


            0%,
            100% {

                transform: translateY(0);

            }


            50% {

                transform: translateY(-30px);

            }


        }







        .login-container {


            width: 100%;

            display: flex;

            justify-content: center;

            align-items: center;


        }





        .login-box {


            width: 420px;

            padding: 45px;


            background: rgba(255, 255, 255, 0.18);

            backdrop-filter: blur(15px);


            border-radius: 25px;


            border: 1px solid rgba(255, 255, 255, 0.3);


            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);


            color: white;


            text-align: center;


        }





        .login-box h1 {


            text-decoration: none;

            font-family: "Pacifico", cursive;

            font-size: 53px;

            color: white;

            letter-spacing: 3px;



        }



        .subtitle {


            font-size: 17px;

            margin-bottom: 35px;

            opacity: 0.9;

        }





        .input-box {


            margin-bottom: 20px;


        }



        .input-box input {


            width: 100%;

            padding: 15px 20px;


            border-radius: 30px;


            border: none;

            outline: none;


            font-size: 16px;


            background: white;


        }







        .options {


            display: flex;

            justify-content: space-between;

            align-items: center;


            font-size: 14px;


            margin-bottom: 25px;


        }



        .options a,
        .register a {


            color: white;

            font-weight: bold;


            text-decoration: none;


        }




        button {


            width: 100%;

            padding: 15px;


            border: none;


            border-radius: 30px;


            font-size: 18px;


            cursor: pointer;


            background: white;


            color: #9c27f9;


            font-weight: bold;


            transition: .3s;


        }



        button:hover {


            transform: scale(1.05);


        }




        .register {


            margin-top: 25px;

            font-size: 15px;

        }
    </style>
</head>


<body>


    <div class="background-icons">

         <span>👕</span>
        <span>👖</span>
        <span>👟</span>
        <span>🧥</span>
        <span>👜</span>
        <span>👗</span>
        <span>👘</span>
        <span>🥼</span>

    </div>



    <div class="login-container">


        <div class="login-box">


            <h1>
                buyForever
            </h1>


            <p class="subtitle">
                Login to continue shopping
            </p>



            <form method="post" action="/login">


                <div class="input-box">

                    <input type="text" placeholder="Full Name" name="username" required>

                </div>



                <div class="input-box">

                    <input type="password" placeholder="Password" name="password" required>

                </div>



                <div class="options">
                    <a href="#">
                        Forgot Password?
                    </a>
                </div>



                <button type="submit">
                    Login
                </button>



                <p class="register">

                    Don't have an account?

                    <a href="/register">
                        Create Account
                    </a>

                </p>



            </form>


        </div>


    </div>



</body>

</html>
